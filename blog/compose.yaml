services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      # platform: linux/arm64  # Uncomment on Apple Silicon if needed
    command: ./bin/rails server -b 0.0.0.0 -p 3000
    # OSスリープ/再起動後、Docker Desktop 起動時にコンテナを自動再開する
    # （手動 `make down` で止めた場合は再開しない）
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/rails:delegated
    environment:
      RAILS_ENV: development
    stdin_open: true
    tty: true

# For PostgreSQL migration, see Specification.md (11.3)
