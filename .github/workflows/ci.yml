name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # weekly on Sunday 00:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog
    strategy:
      matrix:
        ruby-version: ["3.3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libxml2-dev libxslt1-dev zlib1g-dev build-essential

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: blog

      - name: Prepare DB (SQLite)
        run: bundle exec rails db:prepare

      - name: Run tests
        run: bundle exec rails test
