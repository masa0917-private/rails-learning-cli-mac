name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["3.3.6", "3.2.2"]
        db: ["sqlite", "postgres"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
          POSTGRES_DB: blog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rails" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libxml2-dev libxslt1-dev zlib1g-dev build-essential postgresql-client

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Install JS dependencies (if present)
        run: |
          if [ -f package.json ]; then
            if command -v yarn >/dev/null 2>&1; then
              yarn install --frozen-lockfile || true
            else
              npm ci || true
            fi
          fi

      - name: Bundle install (if Gemfile present)
        run: |
          if [ -f Gemfile ]; then
            bundle install --jobs 4 --retry 3
          else
            echo "No Gemfile; skipping bundle install"
          fi

      - name: Setup DB (conditional on Gemfile)
        run: |
          if [ ! -f Gemfile ]; then
            echo "No Gemfile; skipping DB setup"
            exit 0
          fi

          if [ "${{ matrix.db }}" = "postgres" ]; then
            echo "Using PostgreSQL service; waiting for readiness..."
            for i in {1..30}; do
              pg_isready -h 127.0.0.1 -p 5432 -U rails && break || sleep 1
            done
            echo "DATABASE_URL=postgres://rails:password@127.0.0.1:5432/blog_test" >> $GITHUB_ENV
            bundle exec rails db:prepare
          else
            echo "Using SQLite (default)."
            bundle exec rails db:prepare || true
          fi

      - name: Run tests (conditional on Gemfile)
        run: |
          if [ ! -f Gemfile ]; then
            echo "No Gemfile; skipping tests"
            exit 0
          fi

          echo "RAILS_ENV=test"
          bundle exec rails test

      - name: Upload test results (placeholder)
        if: always()
        run: |
          echo "Job completed"
